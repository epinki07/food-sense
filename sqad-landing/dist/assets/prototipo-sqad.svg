<svg width="1600" height="920" viewBox="0 0 1600 920" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Prototipo SQAD</title>
  <desc id="desc">Mockup de landing empresarial SQAD con secciones de producto y métricas</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F9FC"/>
      <stop offset="1" stop-color="#EFF2F6"/>
    </linearGradient>
    <linearGradient id="hero" x1="180" y1="150" x2="1420" y2="390" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF2F2"/>
      <stop offset="0.5" stop-color="#FFF8E8"/>
      <stop offset="1" stop-color="#ECF9F3"/>
    </linearGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#C03535"/>
      <stop offset="1" stop-color="#8D2222"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="2000" height="1200" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1600" height="920" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="90" y="56" width="1420" height="808" rx="24" fill="white"/>
