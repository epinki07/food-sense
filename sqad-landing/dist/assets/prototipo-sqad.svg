  <text x="174" y="121" fill="#1E2B3A" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="800">SQAD</text>
  <text x="590" y="121" fill="#425265" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="600">Empresa</text>
  <text x="670" y="121" fill="#425265" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="600">Producto</text>
  <text x="760" y="121" fill="#425265" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="600">Ventajas</text>
  <text x="850" y="121" fill="#425265" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="600">Soluciones</text>

