  <text x="1088" y="491" fill="#5B697B" font-family="Manrope, Arial, sans-serif" font-size="15">Precisión operativa</text>
  <circle cx="1073" cy="514" r="4" fill="#CC9431"/>
  <text x="1088" y="519" fill="#5B697B" font-family="Manrope, Arial, sans-serif" font-size="15">Velocidad comercial</text>
  <circle cx="1073" cy="542" r="4" fill="#25835F"/>
  <text x="1088" y="547" fill="#5B697B" font-family="Manrope, Arial, sans-serif" font-size="15">Impacto medible</text>

  <rect x="135" y="638" width="1330" height="196" rx="18" fill="#0F2232"/>
  <text x="170" y="684" fill="#E7F2FB" font-family="'DM Serif Display', Georgia, serif" font-size="35">Quality Score</text>
  <circle cx="178" cy="716" r="6" fill="#25835F"/>
  <text x="196" y="721" fill="#B7CBDA" font-family="Manrope, Arial, sans-serif" font-size="15">Seguro</text>
  <circle cx="288" cy="716" r="6" fill="#CC9431"/>
  <text x="306" y="721" fill="#B7CBDA" font-family="Manrope, Arial, sans-serif" font-size="15">Vender pronto</text>
  <circle cx="446" cy="716" r="6" fill="#BF2D2D"/>
  <text x="464" y="721" fill="#B7CBDA" font-family="Manrope, Arial, sans-serif" font-size="15">Riesgo alto</text>

  <rect x="1020" y="672" width="410" height="130" rx="16" fill="#132D41" stroke="#1D445F"/>
  <text x="1050" y="712" fill="#A8C0D4" font-family="Manrope, Arial, sans-serif" font-size="13">Ahorro mensual recuperado</text>
  <text x="1050" y="748" fill="#FFFFFF" font-family="Manrope, Arial, sans-serif" font-size="36" font-weight="800">$10,000 MXN</text>
